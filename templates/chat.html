<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot - SLOTY</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="chat-container">
        <div class="nav-links" style="text-align: center; margin-bottom: 20px;">
            <a href="/chatlog" class="nav-link" style="display: inline-block; padding: 8px 16px; margin: 0 10px; text-decoration: none; color: #0969da; border-radius: 6px; background: #f0f6ff;">📝 Chat History</a>
            <!-- <a href="/admin" class="nav-link" style="display: inline-block; padding: 8px 16px; margin: 0 10px; text-decoration: none; color: #0969da; border-radius: 6px; background: #f0f6ff;">⚙️ Admin</a> -->
        </div>
        <h2>Chat with AI Assistant 🤖</h2>
        <div id="chat-box"></div>
        <div class="input-area">
            <input type="text" id="user-input" placeholder="Type your message here..." autocomplete="off">
            <button onclick="sendMessage()">Send</button>

    <script src="{{ url_for('static', filename='js/chat.js') }}"></script>
