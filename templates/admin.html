<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Manage Intents & Patterns | RuleBot</title>

    <style>
        body { background: #f8f9fa; font-family: Arial, sans-serif; }
        .chat-container { max-width: 1000px; margin: 20px auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h2 { background: #343a40; color: white; padding: 15px; text-align: center; border-radius: 8px 8px 0 0; margin: -20px -20px 20px -20px; }
        h3 { color: #333; margin-top: 30px; }
        .form-container { background: #fff; padding: 20px; border: 1px solid #ddd; border-radius: 8px; margin: 20px 0; }
        input, textarea, select {
            width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ced4da; border-radius: 6px; box-sizing: border-box;
        }
        button {
            padding: 10px 20px; background: #28a745; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 500;
        }
        button:hover { background: #218838; }
        .delete-btn { background: #dc3545; }
        .delete-btn:hover { background: #c82333; }
        table {
            width: 100%; border-collapse: collapse; margin: 15px 0; background: white; box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        th, td { border: 1px solid #dee2e6; padding: 12px; text-align: left; }
        th { background: #007bff; color: white; }
        td[contenteditable="true"] { background: #fff3cd; cursor: text; }
        td[contenteditable="true"]:focus { outline: 2px solid #007bff; }
        .actions button { margin-right: 8px; padding: 6px 12px; font-size: 0.9rem; }
        .back-link { display: block; text-align: center; margin: 40px 0; font-size: 1.1rem; color: #007bff; text-decoration: none; }
    </style>
</head>
<body>
    <div class="chat-container">
        <h2>Admin Panel – Manage Intents & Patterns</h2>

        <!-- Manage Intents -->
        <div class="form-container">
            <h3>Add New Intent</h3>
            <input id="intent_tag" placeholder="Tag (e.g. greeting, fees)" autocomplete="off">
            <textarea id="intent_response" placeholder="Response message..." rows="3"></textarea>
            <button onclick="addIntent()">Add Intent</button>
        </div>

        <h3>All Intents</h3>
        <table id="intents-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Tag</th>
                    <th>Response</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

        <!-- Add Pattern -->
        <div class="form-container">
            <h3>Add Pattern to Intent</h3>
            <select id="intent_select" style="margin-bottom: 12px;"></select>
            <input id="new_pattern" placeholder="New pattern (e.g. namaste, kya haal hai)">
            <button onclick="addPattern()">Add Pattern</button>
        </div>

        <a href="/" class="back-link">← Go to Chat Page</a>
    </div>

    <script>
        function loadIntents() {
            fetch('/admin/intents')
                .then(res => res.json())
                .then(intents => {
                    const tbody = document.querySelector('#intents-table tbody');
                    const select = document.getElementById('intent_select');
                    
                    tbody.innerHTML = '';
                    select.innerHTML = '<option value="">Select Intent...</option>';

                    intents.forEach(intent => {
                        // Table row for intents
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td>${intent.id}</td>
                            <td contenteditable="true" id="tag-${intent.id}">${intent.tag}</td>
                            <td contenteditable="true" id="resp-${intent.id}">${intent.response}</td>
                            <td class="actions">
                                <button onclick="updateIntent(${intent.id})">Update</button>
                                <button class="delete-btn" onclick="deleteIntent(${intent.id})">Delete</button>
                            </td>`;
                        tbody.appendChild(tr);

                        // Dropdown for adding patterns
                        const opt = document.createElement('option');
                        opt.value = intent.id;
                        opt.textContent = `${intent.tag} (ID: ${intent.id})`;
                        select.appendChild(opt);
                    });
                })
                .catch(err => console.error("Failed to load intents:", err));
        }

        function addIntent() {
            const tag = document.getElementById('intent_tag').value.trim();
            const response = document.getElementById('intent_response').value.trim();
            if (!tag || !response) return alert("Tag aur Response dono bharo");

            fetch('/admin/intents', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ tag, response })
            })
            .then(res => {
                if (!res.ok) throw new Error("Add intent failed");
                return res.json();
            })
            .then(() => {
                loadIntents();
                document.getElementById('intent_tag').value = '';
                document.getElementById('intent_response').value = '';
                alert("Intent added!");
            })
            .catch(err => alert("Error: " + err.message));
        }

        function updateIntent(id) {
            const tag = document.getElementById(`tag-${id}`).textContent.trim();
            const response = document.getElementById(`resp-${id}`).textContent.trim();

            fetch(`/admin/intents/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ tag, response })
            })
            .then(res => {
                if (!res.ok) throw new Error("Update failed");
                alert("Intent updated successfully!");
            })
            .catch(err => alert("Error updating intent: " + err.message));
        }

        function deleteIntent(id) {
            if (!confirm("Delete this intent? (Saare patterns bhi delete ho jayenge)")) return;

            fetch(`/admin/intents/${id}`, { method: 'DELETE' })
                .then(res => {
                    if (!res.ok) throw new Error("Delete failed");
                    loadIntents();
                    alert("Intent deleted!");
                })
                .catch(err => alert("Error deleting: " + err.message));
        }

        function addPattern() {
            const intent_id = document.getElementById('intent_select').value;
            const pattern = document.getElementById('new_pattern').value.trim();

            if (!intent_id || !pattern) return alert("Intent select karo aur pattern likho");

            fetch('/admin/patterns', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ intent_id: parseInt(intent_id), pattern })
            })
            .then(res => {
                if (!res.ok) throw new Error("Add pattern failed");
                return res.json();
            })
            .then(() => {
                document.getElementById('new_pattern').value = '';
                alert("Pattern added successfully!");
            })
            .catch(err => alert("Error adding pattern: " + err.message));
        }

        // Load on page open
        window.onload = loadIntents;
    </script>
</body>
</html>
